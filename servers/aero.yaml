services:
  mc:
    image: itzg/minecraft-server:java21
    container_name: minecraft-aero
    stdin_open: true
    tty: true
    ports:
      - "25565:25565"

    env_file:
      - .env
    environment:
      EULA: "TRUE"

      TYPE: "AUTO_CURSEFORGE"

      CF_SLUG: "all-of-create-aeronautics"
      CF_MODPACK_ZIP: "/pack/modpack.zip"
      USE_AIKAR_FLAGS: true
      CURSEFORGE_FILES: |
        chunky-pregenerator-forge
        worldedit
        distant-horizons

      CF_EXCLUDE_MODS: ""
      MEMORY: "6G"

    volumes:
      - ./data:/data
      - ./pack:/pack

    restart: unless-stopped
