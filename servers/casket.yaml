services:
  mc:
    image: itzg/minecraft-server:java17
    container_name: minecraft-souls
    stdin_open: true
    tty: true
    ports:
      - "25565:25565"

    env_file:
      - .env
    environment:
      EULA: "TRUE"

      TYPE: "AUTO_CURSEFORGE"

      # CF_MODPACK_ZIP: "/pack/Cisco's Legacy Dragonfyre-2F Beta.zip"
      CF_SLUG: "nightfallcraft-the-casket-of-reveries"
      CF_MODPACK_ZIP: "/pack/modpack.zip"
      USE_AIKAR_FLAGS: true
      CURSEFORGE_FILES: |
        chunky-pregenerator-forge
      CF_EXCLUDE_MODS: "chat-plus,clear-water,domestication-innovation-whitelist,simple-bedrock-model"
      MEMORY: "6G"

    volumes:
      - ./data:/data
      - ./pack:/pack

    restart: unless-stopped
